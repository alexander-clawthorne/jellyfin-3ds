name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Pinned (not :latest) so image updates can't silently change the toolchain
    container: devkitpro/devkitarm:20260610
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history + tags for git-describe versioning

      - name: Install 3DS portlibs
        run: |
          dkp-pacman -S --noconfirm --needed \
            3ds-curl 3ds-mbedtls 3ds-zlib 3ds-mpg123 \
            3ds-libopus 3ds-opusfile 3ds-libvorbisidec 3ds-libogg

      # The workspace is checked out by the runner uid but make runs as the
      # container's root; without this, git describe fails (dubious
      # ownership) and the binary silently bakes version "unknown".
      - name: Trust workspace for git describe
        run: |
          command -v git >/dev/null || { apt-get update -qq || true; apt-get install -y -qq git; }
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          echo "version will be: $(git describe --tags --always --dirty)"

      # FFmpeg static libs take ~15 min to cross-compile; cache them keyed
      # on the build script (which embeds the pinned FFmpeg commit, so a
      # pin bump invalidates the cache).
      - name: Cache FFmpeg static libs
        id: ffmpeg-cache
        uses: actions/cache@v4
        with:
          path: |
            lib/ffmpeg/*.a
            lib/ffmpeg/include
          key: ffmpeg-3ds-${{ hashFiles('lib/ffmpeg/build-ffmpeg.sh') }}

      - name: Build FFmpeg
        if: steps.ffmpeg-cache.outputs.cache-hit != 'true'
        run: bash lib/ffmpeg/build-ffmpeg.sh

      - name: Build .3dsx
        run: make -j"$(nproc)"

      - name: Upload .3dsx artifact
        uses: actions/upload-artifact@v4
        with:
          name: jellyfin-3ds
          path: jellyfin-3ds.3dsx
